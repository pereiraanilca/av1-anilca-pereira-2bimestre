<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Site</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <h1>Meu site</h1>
      <p>Agora é sua vez! Fale sobre você</p>
    </header>

    <nav>
      <a href="index.html">Início</a>

      <a href="#sobre">Sobre</a>

      <a href="#resumo">Resumo do perfil</a>

      <a href="#interesses">Objetivos</a>

      <a href="#valores">Valores</a>

      <a href="contato.html">Contato</a>

      <a href="historia.html">História</a>

      <a href="curiosidades.html">Curiosidades</a>
    </nav>
    <main>
      <section id="contato">
        <h2>Preencha suas informações</h2>

        <form>
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Ex: Miguel"
            required
          />

          <label for="idade">Idade</label>
          <input
            type="number"
            id="idade"
            name="idade"
            placeholder="Ex: 16"
            required
          />

          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Ex: exemplo@email.com"
            required
          />

          <label for="cidade">Cidade</label>
          <input
            type="text"
            id="cidade"
            name="cidade"
            placeholder="Ex: Recife"
          />

          <label for="musica">Música favorita</label>
          <input
            type="text"
            id="musica"
            name="musica"
            placeholder="Qual música você mais gosta?"
          />

          <label for="bio">Um pouco sobre você</label>
          <textarea
            id="bio"
            name="bio"
            placeholder="Escreva algo sobre você..."
            rows="4"
          ></textarea>

          <label for="cor">Cor favorita</label>
          <input type="color" id="cor" name="cor" />

          <button type="submit">Salvar biografia</button>
        </form>
      </section>
    </main>

    <footer>
      <p>Desenvolvido por Anilca</p>
    </footer>
  </body>
</html>
